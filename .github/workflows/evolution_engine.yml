name: Evolution Engine (12-hour)

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests anthropic
      - name: Run evolution engine
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ABLY_KEY: ${{ secrets.ABLY_KEY }}
        run: python agents/evolution/evolve.py
