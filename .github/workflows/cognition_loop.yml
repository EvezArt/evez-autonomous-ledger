name: Cognition Synthesis Loop (1-hour)

on:
  workflow_dispatch:

jobs:
  cognition:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests anthropic
      - name: Run cognition synthesizer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ABLY_KEY: ${{ secrets.ABLY_KEY }}
        run: python agents/cognition/synthesizer.py
