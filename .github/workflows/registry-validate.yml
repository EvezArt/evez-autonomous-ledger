name: evez-plugin-registry-validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate plugin registry
        run: python scripts/validate_registry.py
